<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nullifire Intumescent Calculator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@35.2.0/styles/ag-grid.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@35.2.0/styles/ag-theme-alpine.css">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1>Nullifire Intumescent Calculator</h1>
        <span id="header-project" class="header-project">No project loaded</span>
        <div id="header-btns" class="header-btns" style="display:none">
            <button class="hbtn" id="btn-export-excel">Export Excel</button>
            <button class="hbtn" id="btn-export-pdf">PDF Report</button>
        </div>
    </header>

    <!-- App -->
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="btn-row">
                <button class="btn btn-primary" id="btn-new" style="flex:1">New Project</button>
                <button class="btn btn-secondary" id="btn-load" style="flex:1">Load</button>
            </div>
            <div id="panel-settings" style="display:none">
                <div class="sb-section">
                    <div class="sb-title">Project</div>
                    <div class="field"><label>Name</label><input id="inp-name" type="text"></div>
                    <div class="field"><label>Client</label><input id="inp-client" type="text"></div>
                </div>
                <div class="sb-section">
                    <div class="sb-title">Fire Protection Defaults</div>
                    <div class="field"><label>Fire Rating</label><select id="sel-fr"></select></div>
                    <div class="field"><label>Failure Temp</label><select id="sel-ft"></select></div>
                    <div class="field"><label>Steel Origin</label><select id="sel-origin"></select></div>
                </div>
                <div class="sb-section">
                    <div class="sb-title">Summary</div>
                    <div class="sb-summary">
                        <div class="srow"><span>Members</span><b id="s-count">0</b></div>
                        <div class="srow"><span>Total Area</span><b id="s-area">0 m²</b></div>
                        <div class="srow"><span>Total Litres</span><b id="s-litres">0 L</b></div>
                        <div class="srow"><span>Total Weight</span><b id="s-weight">0 kg</b></div>
                        <div class="srow">
                            <span>Status</span>
                            <b><span class="dot-g">●</span><span id="s-ok">0</span>
                               <span class="dot-a">●</span><span id="s-warn">0</span>
                               <span class="dot-r">●</span><span id="s-exc">0</span></b>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main -->
        <main class="main">
            <!-- Welcome -->
            <div id="welcome" class="welcome">
                <h2>Nullifire Intumescent Calculator</h2>
                <p>Structural Steel Fire Protection Specification</p>
                <div class="btn-row" style="margin-top:16px">
                    <button class="btn btn-primary" id="btn-new2">New Project</button>
                    <button class="btn btn-secondary" id="btn-load2">Load Project</button>
                </div>
            </div>

            <!-- Work area -->
            <div id="work" class="work">
                <div class="toolbar">
                    <button class="btn btn-primary btn-sm" id="btn-add">+ Add Member</button>
                    <button class="btn btn-secondary btn-sm" id="btn-import">Import CSV/Excel</button>
                    <button class="btn btn-secondary btn-sm" id="btn-del" disabled>Delete Selected</button>
                    <span class="toolbar-info" id="info-count"></span>
                </div>
                <div id="grid" class="ag-theme-alpine grid-box"></div>
            </div>
        </main>
    </div>

    <!-- Product comparison panel -->
    <div id="compare-panel" class="compare-panel">
        <div class="cp-header">
            <b>Product Coverage</b>
            <button class="btn btn-sm btn-secondary" id="btn-close-cp">✕</button>
        </div>
        <div id="cp-body"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@35.2.0/dist/ag-grid-community.min.js"></script>
    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
