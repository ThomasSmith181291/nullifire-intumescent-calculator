<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nullifire Intumescent Calculator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@35.2.0/styles/ag-grid.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@35.2.0/styles/ag-theme-alpine.css">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <div class="header">
        <h1>Nullifire Intumescent Calculator</h1>
        <span class="project-name" id="header-project-name">No project loaded</span>
    </div>

    <div class="app-layout">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="btn-row">
                <button class="btn btn-primary btn-sm" id="btn-new-project" style="flex:1">New Project</button>
                <button class="btn btn-secondary btn-sm" id="btn-load-project" style="flex:1">Load</button>
            </div>

            <div id="project-settings" style="display:none">
                <h3>Project</h3>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="inp-project-name" placeholder="Project name">
                </div>
                <div class="form-group">
                    <label>Client</label>
                    <input type="text" id="inp-project-client" placeholder="Client name">
                </div>

                <h3>Fire Protection Defaults</h3>
                <div class="form-group">
                    <label>Fire Rating</label>
                    <select id="sel-fire-rating"></select>
                </div>
                <div class="form-group">
                    <label>Failure Temperature</label>
                    <select id="sel-failure-temp"></select>
                </div>
                <div class="form-group">
                    <label>Steel Origin</label>
                    <select id="sel-origin"></select>
                </div>

                <h3>Grid & Levels</h3>
                <div class="form-group">
                    <label>Gridlines <button class="btn btn-sm btn-secondary" id="btn-add-gridline" style="float:right">+ Add</button></label>
                    <div id="gridline-list" class="item-list"></div>
                </div>
                <div class="form-group">
                    <label>Levels <button class="btn btn-sm btn-secondary" id="btn-add-level" style="float:right">+ Add</button></label>
                    <div id="level-list" class="item-list"></div>
                </div>

                <h3>Export</h3>
                <div class="btn-row">
                    <button class="btn btn-primary btn-sm" id="btn-export-excel" style="flex:1">Excel</button>
                    <button class="btn btn-secondary btn-sm" id="btn-export-pdf" style="flex:1">PDF Report</button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Welcome screen (shown when no project) -->
            <div id="welcome-screen" class="welcome-screen">
                <div class="welcome-content">
                    <h2>Nullifire Intumescent Calculator</h2>
                    <p>Structural Steel Fire Protection Specification</p>
                    <div class="btn-row" style="justify-content:center;margin-top:20px">
                        <button class="btn btn-primary" id="btn-welcome-new">New Project</button>
                        <button class="btn btn-secondary" id="btn-welcome-load">Load Project</button>
                    </div>
                </div>
            </div>

            <!-- Work area (shown when project loaded) -->
            <div id="work-area" style="display:none;flex:1;display:flex;flex-direction:column">
                <!-- Toolbar -->
                <div class="grid-toolbar">
                    <button class="btn btn-primary btn-sm" id="btn-add-member">+ Add Member</button>
                    <button class="btn btn-secondary btn-sm" id="btn-import">Import CSV/Excel</button>
                    <button class="btn btn-secondary btn-sm" id="btn-delete-selected" disabled>Delete Selected</button>
                    <span class="member-count" id="member-count"></span>
                </div>

                <!-- Main grid area -->
                <div id="member-grid" class="ag-theme-alpine grid-container"></div>

                <!-- Summary bar -->
                <div class="summary-bar" id="summary-bar">
                    <div class="summary-item"><span class="summary-label">Members:</span><span class="summary-value" id="sum-count">0</span></div>
                    <div class="summary-item"><span class="summary-label">Area:</span><span class="summary-value" id="sum-area">0.0 m²</span></div>
                    <div class="summary-item"><span class="summary-label">Litres:</span><span class="summary-value" id="sum-litres">0.0 L</span></div>
                    <div class="summary-item"><span class="summary-label">Weight:</span><span class="summary-value" id="sum-weight">0.0 kg</span></div>
                    <div class="summary-item"><span class="summary-label" style="color:var(--status-green)">●</span><span class="summary-value" id="sum-ok">0</span></div>
                    <div class="summary-item"><span class="summary-label" style="color:var(--status-amber)">●</span><span class="summary-value" id="sum-warning">0</span></div>
                    <div class="summary-item"><span class="summary-label" style="color:var(--status-red)">●</span><span class="summary-value" id="sum-exceeds">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Product comparison panel (slides in from right) -->
    <div id="product-panel" class="product-panel" style="display:none">
        <div class="product-panel-header">
            <h3>Product Coverage</h3>
            <button class="btn btn-sm btn-secondary" id="btn-close-product-panel">✕</button>
        </div>
        <div id="product-panel-content"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@35.2.0/dist/ag-grid-community.min.js"></script>
    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
