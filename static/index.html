<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nullifire Intumescent Calculator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@35.2.0/styles/ag-grid.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@35.2.0/styles/ag-theme-alpine.css">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>Nullifire Intumescent Calculator</h1>
        <span class="project-name">No project loaded</span>
    </div>

    <!-- App Layout -->
    <div class="app-layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="btn-row">
                <button class="btn btn-primary btn-sm" id="btn-new-project" style="flex:1">New Project</button>
                <button class="btn btn-secondary btn-sm" id="btn-load-project" style="flex:1">Load</button>
            </div>

            <h3>Project</h3>
            <div class="form-group">
                <label>Name</label>
                <div id="project-name-display" style="font-size:14px;font-weight:600;padding:4px 0;color:#333">—</div>
            </div>
            <div class="form-group">
                <label>Client</label>
                <input type="text" id="project-client" placeholder="Client name" disabled>
            </div>

            <h3>Defaults</h3>
            <div class="form-group">
                <label>Product</label>
                <select id="product-select"></select>
            </div>
            <div class="form-group">
                <label>Fire Rating</label>
                <select id="fire-rating-select"></select>
            </div>
            <div class="form-group">
                <label>Failure Temperature</label>
                <select id="failure-temp-select"></select>
            </div>
            <div class="form-group">
                <label>Steel Origin</label>
                <select id="origin-select"></select>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Grid Toolbar -->
            <div class="grid-toolbar">
                <button class="btn btn-primary btn-sm" id="btn-add-member" disabled>+ Add Member</button>
                <button class="btn btn-secondary btn-sm" id="btn-delete-selected" disabled>Delete Selected</button>
                <span class="member-count" id="member-count"></span>
            </div>

            <!-- AG Grid -->
            <div id="member-grid" class="ag-theme-alpine grid-container"></div>

            <!-- Summary Bar -->
            <div class="summary-bar" id="summary-bar">
                <div class="summary-item"><span class="summary-label">Members:</span><span class="summary-value">0</span></div>
                <div class="summary-item"><span class="summary-label">Area:</span><span class="summary-value">0.0 m2</span></div>
                <div class="summary-item"><span class="summary-label">Litres:</span><span class="summary-value">0.0 L</span></div>
                <div class="summary-item"><span class="summary-label">Weight:</span><span class="summary-value">0.0 kg</span></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@35.2.0/dist/ag-grid-community.min.js"></script>
    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
